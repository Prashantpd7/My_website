<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prashant Dwivedi - Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="hero-container">
        <div class="hero-content">
            <div class="typing-wrapper">
                <h1 class="hero-title typing-text" id="typingText"></h1>
            </div>

            <div class="buttons-grid">
                <a href="about.html" class="nav-button">About me</a>
                <a href="projects.html" class="nav-button">Project</a>
                <a href="blog.html" class="nav-button">Blog</a>
                <a href="journal.html" class="nav-button">Journal</a>
            </div>
        </div>
    </div>

    <script>
        const typingText = document.getElementById('typingText');
        const fullText = 'Hii, I am Prashant Dwivedi';
        const typingSpeed = 100;
        const pauseTime = 3500;
        let index = 0;
        let isDeleting = false;

        function type() {
            if (!isDeleting) {
                if (index < fullText.length) {
                    typingText.textContent += fullText.charAt(index);
                    index++;
                    setTimeout(type, typingSpeed);
                } else {
                    isDeleting = true;
                    setTimeout(type, pauseTime);
                }
            } else {
                if (index > 0) {
                    typingText.textContent = fullText.substring(0, index - 1);
                    index--;
                    setTimeout(type, typingSpeed);
                } else {
                    isDeleting = false;
                    setTimeout(type, typingSpeed);
                }
            }
        }

        type();
    </script>
</body>
</html>
